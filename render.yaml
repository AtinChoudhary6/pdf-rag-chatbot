services:
  # ── FastAPI Backend ──────────────────────────────────────
  - type: web
    name: rag-backend
    runtime: python
    rootDir: pdf_rag_chatbot/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://rag-frontend.onrender.com   # update after frontend deploys
      - key: GROQ_API_KEY
        sync: false   # you'll paste this in Render dashboard

  # ── Streamlit Frontend ───────────────────────────────────
  - type: web
    name: rag-frontend
    runtime: python
    rootDir: pdf_rag_chatbot/client
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port 10000 --server.address 0.0.0.0
    envVars:
      - key: BACKEND_URL
        value: https://rag-backend.onrender.com   # update after backend deploys